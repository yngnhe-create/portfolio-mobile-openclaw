<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투자커멘드 | 포트폴리오 전체 종목</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #151b2d;
            --bg-header: #1a1f2e;
            --border: #2d3748;
            --text-primary: #e0e6ed;
            --text-secondary: #8b9dc3;
            --accent-red: #ff4757;
            --accent-green: #4ecdc4;
            --accent-blue: #4834d4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 14px;
            padding-bottom: 80px;
        }
        
        .header {
            background: var(--bg-header);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        
        .stock-list {
            padding: 15px;
        }
        .stock-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .stock-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
        }
        .stock-info {
            flex: 1;
        }
        .stock-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 3px;
        }
        .stock-detail {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .stock-numbers {
            text-align: right;
        }
        .stock-current {
            font-size: 16px;
            font-weight: 700;
        }
        .stock-change {
            font-size: 12px;
            font-weight: 600;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-header);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-item {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 10px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 18px; font-weight: 800;">📊 전체 종목</div>
        <div class="tabs">
            <div class="tab active" onclick="showTab('all')">전체</div>
            <div class="tab" onclick="showTab('sector')">섹터별</div>
            <div class="tab" onclick="showTab('performance')">수익률</div>
        </div>
    </div>

    <div class="stock-list" id="stockList">
        <!-- 전체 40+ 종목이 여기에 표시됩니다 -->
        <div class="stock-item">
            <div class="stock-icon" style="background: #1428a0; color: white">삼</div>
            <div class="stock-info">
                <div class="stock-name">삼성전자</div>
                <div class="stock-detail">519주 · 첨단 기술 · 9.3%</div>
            </div>
            <div class="stock-numbers">
                <div class="stock-current">₩1.0억</div>
                <div class="stock-change" style="color: var(--accent-red)">+187%</div>
            </div>
        </div>
        
        <div style="text-align: center; padding: 20px; color: var(--text-secondary)">
            전체 40+ 종목 데이터 로딩중...
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">홈</a>
        <a href="portfolio.html" class="nav-item">포트폴리오</a>
        <a href="wisereport.html" class="nav-item">리포트</a>
    </nav>

    <script>
        function showTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            alert(type + ' 탭 선택됨');
        }
    </script>
</body>
</html>
