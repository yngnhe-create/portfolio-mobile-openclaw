<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 포트폴리오 대시보드</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #2d2d3d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f, #0f172a);
            padding: 20px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-title { font-size: 1.3rem; font-weight: 700; }
        .header-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
        .update-time { font-size: 0.75rem; color: var(--accent-blue); margin-top: 8px; }
        .container { padding: 16px; }
        .summary-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .summary-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
        .summary-value { font-size: 1.2rem; font-weight: 700; }
        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 24px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .asset-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .asset-name { font-size: 1rem; font-weight: 700; }
        .asset-sector { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .asset-rank {
            background: var(--accent-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .asset-body {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .metric {
            text-align: center;
        }
        .metric-label { font-size: 0.65rem; color: var(--text-secondary); margin-bottom: 2px; }
        .metric-value { font-size: 0.9rem; font-weight: 600; }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">📊 포트폴리오 대시보드</div>
        <div class="header-subtitle">실시간 자산 현황</div>
        <div class="update-time" id="updateTime">로딩 중...</div>
    </div>
    
    <div class="container">
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-label">총 자산</div>
                <div class="summary-value" id="totalValue">-</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">총 손익</div>
                <div class="summary-value" id="totalPnl">-</div>
            </div>
        </div>
        
        <div class="section-title">📈 보유 종목</div>
        <div id="assetList">
            <div class="loading">데이터를 불러오는 중...</div>
        </div>
    </div>
    
    <script>
        // Parse CSV data embedded in HTML
        const csvData = `자산,분류,수량,자산가치,매수가,현재가,손익,배당월,투자배당률

BTC/KRW,가상자산,0.698,₩67,800,468,₩82,000,000,₩69,957,+₩10,564,468 (+18.46%),-,-
TIGER 코리아AI전력기기TOP3+,첨단 기술,4121.0,₩65,523,900,₩12,823,₩15,900,+₩12,680,317 (+24.00%),-,-
샤오미,경기 소비재,1000.0,$33,280.00,$10.66,$33.28,+$24,240.00 (+227.39%),-,-
TIGER 글로벌AI액티브,ETF,2257.0,₩51,979,043,₩23,030,₩23,030,+₩0 (+0.00%),-,-
ARTY,첨단 기술,600.0,$29,538.00,$45.01,$49.23,+$3,347.22 (+12.39%),-,-
파마리서치,헬스케어,126.0,₩44,037,000,₩401,408,320500,₩-6,540,408 (-12.93%),4,0.27% (₩138,600)
SOL 미국AI전력인프라,첨단 기술,1760.0,₩35,780,800,₩13,285,$85.84,+₩12,398,855 (+53.03%),-,-
현대차3우B,경기 소비재,104.0,₩31,876,000,₩80,667,245500,+₩23,478,532 (+291.03%),4,6,9,12,16.8% (₩1,829,250)
INTC,첨단 기술,502.0,$23,483.56,$35.1,$46.78,+$5,276.02 (+29.94%),-,-
DL이앤씨우,산업재,1206.0,₩1,173,438,₩19,570,₩973,₩-22,427,982 (-95.03%),4,3.01% (₩711,540)
TIGER 미국테크TOP10 INDXX,ETF,1050.0,₩42,682,500,₩20,918,₩40,650,+₩20,718,600 (+94.33%),-,-
두산,금융,30.0,₩38,340,000,₩846,067,1053000,+₩12,957,990 (+51.05%),4,0.24% (₩60,000)
삼성전자우,첨단 기술,217.0,₩31,204,600,₩46,051,121500,+₩21,211,533 (+212.26%),4,5,8,11,3.18% (₩318,122)
NLR,기타,129.0,$18,096.12,$139.67,$140.28,+$1,299.03 (+7.21%),12,2.27%

ESR켄달스퀘어리츠,부동산,5582.0,₩24,811,990,₩3,762,₩4,445,+₩3,812,089 (+18.15%),3,9,7.28% (₩1,529,468)
ETH/KRW,가상자산,7.998,₩22,787,602,₩3,368,000,₩2,037,₩-4,149,662 (-15.40%),-,-
NVDA,첨단 기술,73.0,$13,488.21,$141.9,$184.77,+$2,576.17 (+24.87%),4,7,10,12,0.03%`;

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const row = {};
                headers.forEach((h, idx) => {
                    row[h] = values[idx] || '';
                });
                data.push(row);
            }
            return data;
        }
        
        function parsePrice(priceStr) {
            if (!priceStr) return 0;
            return parseFloat(priceStr.toString().replace(/[^0-9.-]/g, ''));
        }
        
        function formatCurrency(value, isUSD = false) {
            if (isUSD || value < 1000) {
                return '$' + value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
            return '₩' + Math.round(value).toLocaleString('ko-KR');
        }
        
        function renderPortfolio() {
            const data = parseCSV(csvData);
            const assetList = document.getElementById('assetList');
            
            // Calculate values
            let totalValue = 0;
            let totalCost = 0;
            
            const processed = data.map((row, idx) => {
                const qty = parseFloat(row['수량']) || 0;
                const current = parsePrice(row['현재가']);
                const buy = parsePrice(row['매수가']);
                const isUSD = row['현재가'] && (row['현재가'].includes('$') || ['NVDA','TSLA','AAPL','AMD','AMZN','GOOGL','MSFT'].some(x => row['자산'].includes(x)));
                
                const value = current * qty;
                const cost = buy * qty;
                const pnl = value - cost;
                const pnlPct = cost > 0 ? (pnl / cost * 100) : 0;
                
                totalValue += value;
                totalCost += cost;
                
                return {
                    ...row,
                    qty,
                    current,
                    buy,
                    value,
                    pnl,
                    pnlPct,
                    isUSD,
                    rank: idx + 1
                };
            });
            
            // Sort by value
            processed.sort((a, b) => b.value - a.value);
            
            // Update summary
            document.getElementById('totalValue').textContent = formatCurrency(totalValue);
            const totalPnl = totalValue - totalCost;
            const totalPnlElem = document.getElementById('totalPnl');
            totalPnlElem.textContent = (totalPnl >= 0 ? '+' : '') + formatCurrency(Math.abs(totalPnl));
            totalPnlElem.className = 'summary-value ' + (totalPnl >= 0 ? 'positive' : 'negative');
            
            // Update time
            document.getElementById('updateTime').textContent = new Date().toLocaleString('ko-KR') + ' 2026-03-04 13:16 2026-03-11 17:59 기준';
            
            // Render assets
            assetList.innerHTML = processed.map((asset, idx) => `
                <div class="asset-card">
                    <div class="asset-header">
                        <div>
                            <div class="asset-name">${asset['자산']}</div>
                            <div class="asset-sector">${asset['분류']} · ${asset.qty.toLocaleString()}주</div>
                        </div>
                        <div class="asset-rank">#${idx + 1}</div>
                    </div>
                    <div class="asset-body">
                        <div class="metric">
                            <div class="metric-label">현재가</div>
                            <div class="metric-value">${formatCurrency(asset.current, asset.isUSD)}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">매수가</div>
                            <div class="metric-value">${formatCurrency(asset.buy, asset.isUSD)}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">손익</div>
                            <div class="metric-value ${asset.pnl >= 0 ? 'positive' : 'negative'}">
                                ${asset.pnl >= 0 ? '+' : ''}${asset.pnlPct.toFixed(1)}%
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Render on load
        renderPortfolio();
    </script>
</body>
</html>
